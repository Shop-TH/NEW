<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>HENG888</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--bg4:#222222;
      --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.18);
      --text:#f5f5f0;--text2:rgba(245,245,240,0.60);--text3:rgba(245,245,240,0.32);
      --gold:#d4a847;--gold2:#f0c860;--gold-bg:rgba(212,168,71,0.10);--gold-bd:rgba(212,168,71,0.28);
      --red:#e05555;--green:#4caf7d;--font:'Prompt',sans-serif;--r:14px;--r-lg:20px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{background:var(--bg);overscroll-behavior:none;min-height:100vh;}
    body{font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;}
    img{display:block;} button,input,textarea,select{font-family:var(--font);cursor:pointer;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(36px)}to{opacity:1;transform:translateY(0)}}
    @keyframes dotP{0%,100%{opacity:.2}50%{opacity:1}}
    @keyframes lineIn{from{width:0;opacity:0}to{width:60px;opacity:1}}
    @keyframes checkPop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
    #root{min-height:100vh;}
    .page{min-height:100vh;display:flex;flex-direction:column;}
    .page-body{flex:1;overflow-y:auto;padding-bottom:20px;}
    .bottom-bar{position:sticky;bottom:0;left:0;right:0;background:rgba(10,10,10,0.98);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:14px 18px 32px;display:flex;flex-direction:column;gap:10px;z-index:50;}
    .bottom-bar-row{display:flex;gap:10px;}
    .btn{border-radius:var(--r);padding:15px 20px;font-family:var(--font);font-size:16px;font-weight:600;border:none;cursor:pointer;transition:opacity .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;text-align:center;line-height:1;}
    .btn:active{transform:scale(.96);} .btn-full{width:100%;}
    .btn-gold{background:var(--gold);color:#0a0a0a;font-weight:700;box-shadow:0 4px 24px rgba(212,168,71,.35);}
    .btn-gold:hover{background:var(--gold2);}
    .btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--text2);font-weight:500;}
    .btn-back{background:var(--bg3);border:1.5px solid var(--border2);color:var(--text2);font-weight:500;font-size:15px;}
    .btn-add-empty{background:var(--bg3);border:1.5px solid var(--border2);color:var(--text2);font-size:13px;padding:8px 14px;}
    .btn-add-filled{background:var(--gold);border:1.5px solid var(--gold);color:#0a0a0a;font-size:13px;padding:8px 14px;font-weight:700;}
    .btn-add-empty:active,.btn-add-filled:active{transform:scale(.91);}
    .btn:disabled{opacity:.30;cursor:not-allowed;transform:none!important;}
    .topbar{padding:18px 20px 14px;background:rgba(10,10,10,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
    .topbar-title{font-size:18px;font-weight:700;color:var(--text);}
    .topbar-sub{font-size:13px;font-weight:400;color:var(--text3);margin-top:3px;}
    /* SPLASH */
    .splash{height:100vh;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .sp-logo{font-size:52px;font-weight:800;color:var(--text);letter-spacing:4px;animation:scaleIn .7s cubic-bezier(.22,1,.36,1) both;}
    .sp-logo span{color:var(--gold);}
    .sp-line{width:0;height:1px;margin:20px 0;background:linear-gradient(to right,transparent,var(--gold),transparent);animation:lineIn .8s .5s both ease;}
    .sp-tag{font-size:11px;font-weight:400;letter-spacing:4px;color:var(--text3);text-transform:uppercase;animation:fadeIn .6s .6s both;}
    .sp-dots{display:flex;gap:8px;margin-top:36px;animation:fadeIn .6s .9s both;}
    .sp-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);animation:dotP 1.6s infinite;}
    .sp-dot:nth-child(2){animation-delay:.28s}.sp-dot:nth-child(3){animation-delay:.56s}
    /* HOME */
    .home-hero{padding:44px 22px 28px;}
    .home-label{font-size:11px;font-weight:500;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;animation:fadeUp .5s both;}
    .home-title{font-size:30px;font-weight:800;color:var(--text);line-height:1.25;animation:fadeUp .5s .07s both;}
    .home-sub{font-size:14px;font-weight:400;color:var(--text2);line-height:1.7;margin-top:10px;animation:fadeUp .5s .14s both;}
    .brand-list{padding:0 16px 16px;display:flex;flex-direction:column;gap:12px;}
    /* BRAND CARD Style H */
    .brand-card{width:100%;height:110px;border-radius:var(--r-lg);overflow:hidden;position:relative;display:block;cursor:pointer;background:linear-gradient(135deg,#111111,#161616);border:none;animation:fadeUp .5s both;transition:transform .15s;}
    .brand-card:active{transform:scale(.97);}
    .bc-top-line{position:absolute;top:0;left:0;width:60%;height:2px;background:linear-gradient(to right,#d4a847,rgba(212,168,71,.1));}
    .bc-bot-line{position:absolute;bottom:0;left:0;width:40px;height:1.5px;background:linear-gradient(to right,#d4a847,transparent);}
    .bc-content{position:absolute;left:20px;top:50%;transform:translateY(-50%);}
    .bc-label{font-size:10px;font-weight:400;color:rgba(212,168,71,.55);letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;}
    .bc-name{font-size:30px;font-weight:800;color:var(--text);letter-spacing:1px;line-height:1;}
    .bc-logo-right{position:absolute;right:0;top:0;bottom:0;width:100px;background:linear-gradient(to left,rgba(212,168,71,.05),transparent);display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .bc-logo-right img{width:80px;height:80px;object-fit:contain;opacity:.55;filter:grayscale(20%);}
    .bc-logo-right-emoji{font-size:44px;opacity:.18;}
    .cart-fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gold);border:none;border-radius:50px;padding:14px 28px;display:flex;align-items:center;gap:10px;color:#0a0a0a;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;z-index:50;box-shadow:0 6px 28px rgba(212,168,71,.35);animation:slideUp .35s ease both;white-space:nowrap;}
    .cart-fab:active{transform:translateX(-50%) scale(.96);}
    .fab-badge{background:#0a0a0a;color:var(--gold);border-radius:20px;padding:2px 10px;font-size:13px;font-weight:700;}
    /* PRODUCTS */
    .prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px;}
    .prod-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s;animation:fadeUp .45s both;}
    .prod-card:hover{border-color:var(--border2);}
    .prod-img{position:relative;padding-top:100%;overflow:hidden;background:var(--bg3);cursor:pointer;}
    .prod-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s ease;}
    .prod-card:hover .prod-img img{transform:scale(1.05);}
    .prod-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:34px;}
    .prod-over{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,10,.6) 0%,transparent 50%);}
    .prod-bdg{position:absolute;top:8px;right:8px;background:var(--gold);color:#0a0a0a;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;}
    .prod-body{padding:11px 12px 13px;}
    .prod-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.5;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer;min-height:40px;}
    .prod-row{display:flex;justify-content:space-between;align-items:center;}
    .prod-price{font-size:15px;font-weight:700;color:var(--gold);}

    .d-hero img{width:100%;height:100%;object-fit:cover;}
    .d-hero-icon{font-size:90px;}
    .d-hero-ov{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,transparent 55%);}
    .d-body{padding:0 22px 22px;margin-top:-24px;position:relative;}
    .d-tag{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:500;color:var(--text3);margin-bottom:14px;letter-spacing:1px;}
    .d-name{font-size:24px;font-weight:800;color:var(--text);line-height:1.25;margin-bottom:8px;}
    .d-price{font-size:28px;font-weight:700;color:var(--gold);margin-bottom:20px;}
    .d-info-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;}
    .d-info-label{font-size:10px;font-weight:600;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:8px;}
    .d-info-text{font-size:14px;font-weight:400;color:var(--text2);line-height:1.8;}
    .d-cod{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;font-size:13px;font-weight:400;color:var(--text3);}
    /* CART */
    .cart-list{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
    .cart-item{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;display:flex;gap:12px;align-items:center;}
    .c-thumb{width:62px;height:62px;border-radius:var(--r);overflow:hidden;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:26px;}
    .c-thumb img{width:100%;height:100%;object-fit:cover;}
    .c-info{flex:1;min-width:0;}
    .c-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .c-price{font-size:15px;font-weight:700;color:var(--gold);}
    .qty-ctrl{display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .qty-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);}
    .qty-btn:active{background:var(--bg4);}
    .qty-num{font-size:15px;font-weight:600;min-width:24px;text-align:center;}
    .cart-total-row{display:flex;justify-content:space-between;align-items:center;padding:0 4px 4px;}
    .cart-total-lbl{font-size:12px;font-weight:500;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
    .cart-total-val{font-size:26px;font-weight:700;color:var(--gold);}
    /* PAYMENT */
    .pay-list{padding:16px;display:flex;flex-direction:column;gap:14px;}
    .bank-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;}
    .bank-sec-lbl{font-size:11px;font-weight:600;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
    .bank-sec-lbl::after{content:'';flex:1;height:1px;background:var(--gold-bd);}
    .bank-row{display:flex;align-items:center;gap:12px;}
    .bank-icon{font-size:28px;}
    .bank-detail{flex:1;}
    .bank-name{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:2px;}
    .bank-number{font-family:var(--font);font-size:24px;font-weight:800;color:var(--text);letter-spacing:1px;margin-bottom:2px;cursor:pointer;user-select:all;display:flex;align-items:center;gap:8px;}
    .bank-holder{font-size:12px;font-weight:400;color:var(--text3);}
    .copy-badge{font-size:11px;font-weight:500;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-bd);border-radius:6px;padding:2px 8px;letter-spacing:.5px;white-space:nowrap;}
    .amt-box{background:var(--gold-bg);border:1.5px solid var(--gold-bd);border-radius:var(--r-lg);padding:20px;text-align:center;}
    .amt-lbl{font-size:12px;font-weight:600;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
    .amt-val{font-size:44px;font-weight:800;color:var(--gold2);line-height:1;}
    .amt-note{font-size:12px;font-weight:400;color:var(--text3);margin-top:8px;}
    .field-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;}
    .field-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
    .field-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
    .field-title{font-size:16px;font-weight:700;color:var(--text);}
    .field-desc{font-size:12px;font-weight:400;color:var(--text3);margin-top:3px;line-height:1.5;}
    .field-input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 16px;font-family:var(--font);font-size:16px;font-weight:500;color:var(--text);outline:none;transition:border-color .2s;}

    .field-input::placeholder{color:var(--text3);font-weight:400;font-size:14px;}
    .field-textarea{resize:none;min-height:96px;line-height:1.7;font-size:15px;}
    .field-err{font-size:13px;font-weight:500;color:var(--red);margin-top:8px;display:none;padding:8px 12px;background:rgba(224,85,85,.08);border-radius:8px;border:1px solid rgba(224,85,85,.2);}
    .field-err.show{display:block;}
    .loc-btn{width:100%;background:var(--bg3);border:1.5px dashed var(--border2);border-radius:var(--r);padding:16px;font-family:var(--font);font-size:15px;font-weight:500;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;}

    .slip-upload-btn{width:100%;background:var(--bg3);border:1.5px dashed var(--border2);border-radius:var(--r);padding:18px 16px;font-family:var(--font);display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .2s;}

    .slip-upload-ico{font-size:28px;flex-shrink:0;}
    .slip-upload-txt{font-size:15px;font-weight:600;color:var(--text2);}
    .slip-upload-sub{font-size:12px;font-weight:400;color:var(--text3);margin-top:2px;}
    .slip-preview-row{display:flex;align-items:center;gap:14px;background:var(--bg3);border:1.5px solid rgba(76,175,125,.35);border-radius:var(--r);padding:12px 14px;}
    .slip-thumb{width:56px;height:56px;border-radius:10px;overflow:hidden;flex-shrink:0;border:1px solid var(--border);background:var(--bg4);}
    .slip-thumb img{width:100%;height:100%;object-fit:cover;}
    .slip-preview-info{flex:1;min-width:0;}
    .slip-preview-ok{font-size:14px;font-weight:600;color:var(--green);}
    .slip-preview-name{font-size:12px;font-weight:400;color:var(--text3);margin-top:2px;}
    .slip-change-btn{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text2);flex-shrink:0;}
    /* SUCCESS */
    .suc-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:36px;text-align:center;background:var(--bg);}
    .suc-check{width:80px;height:80px;border-radius:50%;background:var(--gold-bg);border:1.5px solid var(--gold-bd);display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:checkPop .5s cubic-bezier(.22,1,.36,1);}
    .suc-check-icon{font-size:36px;}
    .suc-title{font-size:26px;font-weight:800;color:var(--text);margin-bottom:8px;animation:fadeUp .5s .1s both;}
    .suc-sub{font-size:14px;font-weight:400;color:var(--text2);line-height:1.8;margin-bottom:24px;animation:fadeUp .5s .15s both;}
    .suc-order-card{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px;animation:fadeUp .5s .2s both;}
    .suc-order-header{background:var(--gold-bg);border-bottom:1px solid var(--gold-bd);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;}
    .suc-order-id-lbl{font-size:11px;font-weight:500;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
    .suc-order-id-val{font-family:var(--font);font-size:20px;font-weight:800;color:var(--gold);}
    .suc-order-rows{padding:14px 20px;display:flex;flex-direction:column;gap:12px;}
    .suc-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
    .suc-row-lbl{font-size:13px;font-weight:400;color:var(--text3);flex-shrink:0;}
    .suc-row-val{font-size:13px;font-weight:600;color:var(--text);text-align:right;}
    .suc-divider{height:1px;background:var(--border);}
    .suc-total-row{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-top:1px solid var(--border);}
    .suc-total-lbl{font-size:14px;font-weight:500;color:var(--text2);}
    .suc-total-val{font-size:22px;font-weight:800;color:var(--gold);}
    .suc-steps{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 20px;margin-bottom:16px;text-align:left;animation:fadeUp .5s .25s both;}
    .suc-steps-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px;}
    .suc-step{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;}
    .suc-step:last-child{margin-bottom:0;}
    .suc-step-num{width:22px;height:22px;border-radius:50%;background:var(--gold-bg);border:1px solid var(--gold-bd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gold);flex-shrink:0;margin-top:1px;}
    .suc-step-txt{font-size:13px;font-weight:400;color:var(--text2);line-height:1.6;}
    .empty-wrap{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:36px;text-align:center;}
    .empty-ico{font-size:52px;opacity:.4;}
    .empty-t{font-size:20px;font-weight:700;color:var(--text);}
    .empty-s{font-size:13px;font-weight:400;color:var(--text3);}
  </style>
</head>

  function bPa(){
    document.getElementById("bk-cart")?.addEventListener("click",()=>set({screen:"cart"}));
    const sb=document.getElementById("sb");const sa=document.getElementById("sa");const sp=document.getElementById("sp");const sim=document.getElementById("sim");const si=document.getElementById("si");
    function chk(){const ph=document.getElementById("fp")?.value.trim()||"";const ad=document.getElementById("fa")?.value.trim()||"";const rdy=ph.length===10&&ad.length>5&&!!S.info?.location&&!!S.slip;sb.disabled=!rdy;sb.style.opacity=rdy?"1":".30";}
    document.getElementById("fp")?.addEventListener("input",chk);document.getElementById("fa")?.addEventListener("input",chk);
    document.getElementById("gl")?.addEventListener("click",()=>{
      if(!navigator.geolocation){alert("ไม่รองรับการแชร์ตำแหน่งครับ");return;}
      const btn=document.getElementById("gl");btn.textContent="⏳ กำลังดึงตำแหน่ง...";btn.disabled=true;
      navigator.geolocation.getCurrentPosition(pos=>{const loc={lat:pos.coords.latitude,lng:pos.coords.longitude};S.info={...S.info,location:loc};btn.className="loc-btn got";btn.textContent=`✅ บันทึกพิกัดแล้ว (${loc.lat.toFixed(4)}, ${loc.lng.toFixed(4)})`;btn.disabled=false;const mb=document.getElementById("mb");mb.innerHTML=`<iframe src="https://maps.google.com/maps?q=${loc.lat},${loc.lng}&z=16&output=embed" allowfullscreen></iframe>`;mb.classList.add("show");chk();},()=>{btn.textContent="❌ ดึงตำแหน่งไม่ได้ กดอีกครั้ง";btn.disabled=false;},{enableHighAccuracy:true,timeout:10000});
    });
    si?.addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{S.slip=ev.target.result;S.slipName=f.name;sim.src=ev.target.result;const fn=document.getElementById("slip-fname");if(fn)fn.textContent=f.name.length>24?f.name.slice(0,24)+"...":f.name;sa.style.display="none";sp.style.display="block";chk();};r.readAsDataURL(f);});
    document.getElementById("cs")?.addEventListener("click",()=>{S.slip=null;S.slipName="";sa.style.display="block";sp.style.display="none";chk();});
    sb?.addEventListener("click",async()=>{
      const ph=document.getElementById("fp")?.value.trim();const ad=document.getElementById("fa")?.value.trim();
      let ok=true;
      if(ph.length!==10){document.getElementById("ep").classList.add("show");ok=false;}else document.getElementById("ep").classList.remove("show");
      if(ad.length<5){document.getElementById("ea").classList.add("show");ok=false;}else document.getElementById("ea").classList.remove("show");
      if(!ok||!S.slip||!S.info?.location)return;
      sb.disabled=true;sb.textContent="⏳ กำลังส่ง...";
      const info={phone:ph,address:ad,note:document.getElementById("fn")?.value.trim()||"",location:S.info.location};
      try{
        const id=await saveOrd(S.cart,S.products,info);
        await sendSlip(id,S.slip,S.cart,S.products,info);
        const snap={orderId:id,customerName:((U?.first_name||"")+" "+(U?.last_name||"")).trim()||"-",phone:ph,items:S.cart.map(i=>{const p=S.products.find(x=>x.id===i.id);const b=S.brands.find(x=>x.key===p?.brand);return{name:p?.name||"",brand:b?.name||"",price:p?.price||0,qty:i.qty};}),total:tot(S.cart,S.products)};
        set({screen:"success",orderId:id,cart:[],slip:null,slipName:"",info:{phone:"",address:"",note:"",location:null},orderSnapshot:snap});
      }catch(e){sb.disabled=false;sb.textContent="📤 ส่งข้อมูลและสลิป";alert("เกิดข้อผิดพลาด กรุณาลองใหม่ครับ");}
    });
  }
  function bSu(){document.getElementById("rs")?.addEventListener("click",()=>set({screen:"home",cart:[],orderId:null,slip:null,slipName:"",info:{phone:"",address:"",note:"",location:null},orderSnapshot:null}));}
  function addC(id){const ex=S.cart.find(i=>i.id===id);set({cart:ex?S.cart.map(i=>i.id===id?{...i,qty:i.qty+1}:i):[...S.cart,{id,qty:1}]});}
  function upQ(id,d){set({cart:S.cart.map(i=>i.id===id?{...i,qty:i.qty+d}:i).filter(i=>i.qty>0)});}

  /* ── INIT ── */
  async function init(){
    render();
    // ✅ เช็ค admin ทันที ไม่รอ network
    const isAdmin=checkAdmin();
    if(isAdmin){
      // แสดง splash แอดมิน แล้ว redirect เร็วๆ
      document.getElementById("root").innerHTML=`
        <div class="splash">
          <div class="sp-logo">HENG<span>888</span></div>
          <div class="sp-line"></div>
          <div class="sp-tag">Admin Panel</div>
          <div class="sp-dots">
            <div class="sp-dot"></div>
            <div class="sp-dot"></div>
            <div class="sp-dot"></div>
          </div>
        </div>`;
      setTimeout(()=>{
        window.location.href="https://shop-th.github.io/NEW/admin.html";
      },800);
      return;
    }
    try{const[b,p]=await Promise.all([fBr(),fPr()]);S.brands=b;S.products=p;track();}catch(e){console.error(e);}
    setTimeout(()=>set({screen:"home"}),2400);
  }
  init();
</script>
</body>
