<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>SkinMart Admin</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap');
    :root{--bg:#f4f6f9;--white:#fff;--border:#e8eaed;--text:#1a1a2e;--muted:#888;--green:#00B900;--red:#f44336;--blue:#1565c0;--orange:#f57c00;--font:'Prompt',sans-serif;}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{background:var(--bg);overscroll-behavior:none;}
    body{font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;}
    .center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:32px;height:100vh;}
    .header{background:linear-gradient(135deg,var(--green),#00952b);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,185,0,0.25);}
    .header-left{display:flex;align-items:center;gap:10px;}
    .header-ava{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;}
    .header-title{color:#fff;font-weight:700;font-size:15px;}
    .header-sub{color:rgba(255,255,255,0.75);font-size:11px;margin-top:1px;}
    .header-badge{background:rgba(255,255,255,0.2);border-radius:20px;padding:4px 12px;color:#fff;font-size:11px;font-weight:600;}
    .tabs{background:var(--white);border-bottom:1px solid var(--border);display:flex;position:sticky;top:65px;z-index:99;}
    .tab{flex:1;padding:12px 4px;border:none;background:transparent;font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.2s;}
    .tab.active{color:var(--green);border-bottom-color:var(--green);}
    .content{padding:14px;padding-bottom:80px;}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
    .card-title{font-size:14px;font-weight:700;}
    .prod-item{background:var(--white);border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05);display:flex;align-items:center;gap:12px;border-left:4px solid transparent;}
    .prod-thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;}
    .prod-thumb img{width:100%;height:100%;object-fit:cover;}
    .prod-info{flex:1;min-width:0;}
    .prod-name{font-size:13px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .prod-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px;}
    .prod-price{font-size:13px;font-weight:700;}
    .prod-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
    .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
    .badge-green{background:#e8f5e9;color:#2e7d32;}
    .badge-gray {background:#f5f5f5;color:#999;}
    .badge-orange{background:#fff3e0;color:#e65100;}
    .badge-red  {background:#ffebee;color:#c62828;}
    .btn{border:none;border-radius:8px;padding:8px 14px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;justify-content:center;transition:all 0.15s;}
    .btn:active{transform:scale(0.95);}
    .btn-green {background:var(--green);color:#fff;}
    .btn-blue  {background:#e3f2fd;color:var(--blue);}
    .btn-orange{background:#fff3e0;color:var(--orange);}
    .btn-red   {background:#ffebee;color:var(--red);}
    .btn-gray  {background:#f5f5f5;color:#666;}
    .btn-full  {width:100%;padding:13px;}
    .btn-sm    {padding:5px 10px;font-size:11px;}
    .btn-icon  {width:32px;height:32px;padding:0;border-radius:8px;font-size:14px;}
    .form-group{margin-bottom:14px;}
    .form-label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase;}
    .form-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:var(--font);font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s;background:#fff;}
    .form-input:focus{border-color:var(--green);}
    .form-textarea{resize:vertical;min-height:80px;}
    .form-select{appearance:none;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .toggle-wrap{display:flex;align-items:center;justify-content:space-between;background:#f8f8f8;border-radius:10px;padding:10px 14px;}
    .toggle{width:44px;height:24px;border-radius:12px;cursor:pointer;position:relative;border:none;flex-shrink:0;transition:background 0.2s;}
    .toggle-knob{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.2);transition:left 0.2s;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
    .modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 18px 40px;animation:slideModal 0.3s ease;}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
    .modal-title{font-size:16px;font-weight:800;}
    .modal-close{background:#f5f5f5;border:none;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:16px;}
    @keyframes slideModal{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;}
    .confirm-box{background:#fff;border-radius:16px;width:100%;max-width:320px;padding:24px 20px;animation:popIn 0.2s ease;}
    @keyframes popIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
    .confirm-icon{font-size:40px;text-align:center;margin-bottom:12px;}
    .confirm-title{font-size:16px;font-weight:800;text-align:center;margin-bottom:8px;}
    .confirm-desc{font-size:13px;color:var(--muted);text-align:center;line-height:1.7;margin-bottom:20px;white-space:pre-line;}
    .confirm-actions{display:flex;gap:10px;}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);border-radius:28px;padding:10px 24px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2);white-space:nowrap;animation:toastIn 0.3s ease;pointer-events:none;}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .spinner{width:20px;height:20px;border:2px solid #eee;border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .alert-bar{background:#fff3e0;border:1px solid #ffcc80;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-size:13px;color:#e65100;}
    .brand-card-admin{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,0.06);}
    .brand-card-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
    .brand-card-info{display:flex;align-items:center;gap:12px;}
    .brand-emoji-box{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
    .order-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
    .order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .order-id{font-weight:800;color:var(--green);font-size:14px;}
    .order-meta{font-size:12px;color:var(--muted);margin-bottom:6px;line-height:1.7;}
    .order-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:8px;margin-top:8px;}
    .order-total{font-weight:800;font-size:15px;color:var(--blue);}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
    .stat-card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,0.06);}
    .stat-val{font-size:20px;font-weight:800;margin-top:4px;}
    .stat-label{font-size:11px;color:var(--muted);}
    .empty{text-align:center;padding:40px 20px;color:var(--muted);}
    .empty-icon{font-size:48px;margin-bottom:12px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc,
           addDoc, collection, getDocs, query, where,
           serverTimestamp, increment }
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  // ══════════════════════════════════════════
  //  ⚙️  CONFIG
  // ══════════════════════════════════════════
  const FIREBASE_CONFIG = {
    apiKey           : "AIzaSyBCykbrwCiWO1eAlj9YgpeJj9JGPc6XEK4",
    authDomain       : "shop-th.firebaseapp.com",
    projectId        : "shop-th",
    storageBucket    : "shop-th.firebasestorage.app",
    messagingSenderId: "407059998090",
    appId            : "1:407059998090:web:e008bcb4042e574eb7d473",
  };
  const SHOP_ID         = "shop_001";
  const ADMIN_CHAT_ID   = "7234688831";
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhhrVhTYsz6nFAWHfWylSuBAexqKKA3lX_U6ID0--i9No83XEM7QxrX1PNIARKXnW_/exec";

  const app     = initializeApp(FIREBASE_CONFIG);
  const db      = getFirestore(app);
  const tg      = window.Telegram?.WebApp;
  const TG_USER = tg?.initDataUnsafe?.user || null;
  if (tg) tg.expand();

  // ══════════════════════════════════════════
  //  🔢  UTILS
  // ══════════════════════════════════════════
  const fmt = n => "฿" + Number(n).toLocaleString("th-TH");
  let toastTimer = null;

  function toast(msg, type="success") {
    document.querySelector(".toast")?.remove();
    if (toastTimer) clearTimeout(toastTimer);
    const t = document.createElement("div");
    t.className = "toast";
    t.textContent = msg;
    t.style.background = type==="success"?"#00B900":type==="error"?"#f44336":"#f57c00";
    t.style.color = "#fff";
    document.body.appendChild(t);
    toastTimer = setTimeout(() => t.remove(), 2500);
  }

  // ══════════════════════════════════════════
  //  🔐  AUTH
  // ══════════════════════════════════════════
  let ADMIN = null;

  async function checkAuth() {
    // เปิดจาก Telegram — อ่าน Chat ID อัตโนมัติ
    if (TG_USER) {
      const chatId = String(TG_USER.id);
      const snap   = await getDoc(doc(db, "admins", chatId));
      if (snap.exists() && snap.data().active) {
        ADMIN = snap.data();
        return true;
      }
      // ถ้าไม่มีใน admins collection ให้เช็ค ADMIN_CHAT_ID โดยตรง
      if (chatId === ADMIN_CHAT_ID) {
        ADMIN = { chatId, name: TG_USER.first_name || "แอดมิน", role: "superadmin" };
        return true;
      }
      return false;
    }
    // เปิดจากเบราว์เซอร์ปกติ — แสดงหน้า login
    return "browser";
  }

  // ══════════════════════════════════════════
  //  🔥  FIREBASE
  // ══════════════════════════════════════════
  async function loadBrands() {
    const snap = await getDocs(collection(db, "shops", SHOP_ID, "brands"));
    return snap.docs.map(d => ({ docId:d.id, ...d.data() }));
  }

  async function loadProducts() {
    const snap = await getDocs(collection(db, "shops", SHOP_ID, "products"));
    return snap.docs.map(d => ({ docId:d.id, ...d.data() }))
      .sort((a,b) => (a.brand||"").localeCompare(b.brand||""));
  }

  async function loadOrders() {
    const snap = await getDocs(collection(db, "orders"));
    return snap.docs.map(d => ({ docId:d.id, ...d.data() }))
      .sort((a,b) => (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  }

  async function saveProd(data, docId) {
    const ref = docId
      ? doc(db, "shops", SHOP_ID, "products", docId)
      : doc(db, "shops", SHOP_ID, "products", data.id || Date.now().toString());
    await setDoc(ref, data, { merge:true });
  }

  async function delProd(docId) {
    await deleteDoc(doc(db, "shops", SHOP_ID, "products", docId));
  }

  async function saveBrand(data, docId) {
    const ref = docId
      ? doc(db, "shops", SHOP_ID, "brands", docId)
      : doc(db, "shops", SHOP_ID, "brands", data.key || Date.now().toString());
    await setDoc(ref, data, { merge:true });
  }

  async function delBrand(docId) {
    await deleteDoc(doc(db, "shops", SHOP_ID, "brands", docId));
  }

  async function updateOrder(docId, status, chatId) {
    await updateDoc(doc(db, "orders", docId), { status });
    // แจ้ง Apps Script ให้ส่งข้อความกลับลูกค้า
    try {
      await fetch(APPS_SCRIPT_URL, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ action:"order_status", orderId:docId, status, chatId }),
      });
    } catch(e) { console.error(e); }
  }

  // ══════════════════════════════════════════
  //  🎮  STATE
  // ══════════════════════════════════════════
  let S = {
    view:"loading", tab:"products",
    brands:[], products:[], orders:[],
    modal:null, modalData:{}, confirm:null,
    browserChatId:"",
  };

  function setState(patch) { S={...S,...patch}; render(); }

  async function loadAll() {
    const [brands,products,orders] = await Promise.all([loadBrands(),loadProducts(),loadOrders()]);
    S.brands=brands; S.products=products; S.orders=orders;
  }

  // ══════════════════════════════════════════
  //  📺  RENDER
  // ══════════════════════════════════════════
  function render() {
    const root = document.getElementById("root");
    if (S.view==="loading") { root.innerHTML=`<div class="center"><div class="spinner" style="width:36px;height:36px;border-width:3px"></div><div style="color:#888;font-size:13px;margin-top:8px">กำลังโหลด...</div></div>`; return; }
    if (S.view==="denied")  { root.innerHTML=`<div class="center"><div style="font-size:56px">🔒</div><div style="font-size:18px;font-weight:800">ไม่มีสิทธิ์เข้าใช้งาน</div><div style="font-size:13px;color:#888">กรุณาเปิดผ่าน Telegram Bot ค่ะ<br>หรือติดต่อผู้ดูแลระบบ</div></div>`; return; }
    if (S.view==="browser") { root.innerHTML=browserLoginHTML(); bindBrowserLogin(); return; }

    let content = "";
    if (S.tab==="products") content = prodsTab();
    if (S.tab==="brands")   content = brandsTab();
    if (S.tab==="orders")   content = ordersTab();
    if (S.tab==="stats")    content = statsTab();

    root.innerHTML = `
      <div class="header">
        <div class="header-left">
          <div class="header-ava">⚙️</div>
          <div>
            <div class="header-title">SkinMart Admin</div>
            <div class="header-sub">${ADMIN?.name || TG_USER?.first_name || "แอดมิน"}</div>
          </div>
        </div>
        <div class="header-badge">${S.products.length} SKU</div>
      </div>
      <div class="tabs">
        <button class="tab ${S.tab==="products"?"active":""}" data-tab="products">📦 สินค้า</button>
        <button class="tab ${S.tab==="brands"?"active":""}"   data-tab="brands">🏷️ แบรนด์</button>
        <button class="tab ${S.tab==="orders"?"active":""}"   data-tab="orders">📋 ออเดอร์</button>
        <button class="tab ${S.tab==="stats"?"active":""}"    data-tab="stats">📊 ภาพรวม</button>
      </div>
      <div class="content">${content}</div>
      ${S.modal   ? modalHTML()   : ""}
      ${S.confirm ? confirmHTML() : ""}`;

    bindMain();
    if (S.modal)   bindModal();
    if (S.confirm) bindConfirm();
  }

  // ══════════════════════════════════════════
  //  🖼️  BROWSER LOGIN
  // ══════════════════════════════════════════
  const browserLoginHTML = () => `
    <div class="center" style="background:linear-gradient(135deg,#f0fff4,#e8f5e9);min-height:100vh">
      <div style="font-size:64px">🔐</div>
      <div style="font-size:22px;font-weight:800">SkinMart Admin</div>
      <div style="font-size:13px;color:#888;text-align:center;line-height:1.7">กรอก Chat ID ของคุณ<br>เพื่อเข้าใช้งานค่ะ</div>
      <div style="background:#fff;border-radius:16px;padding:20px;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,0.08)">
        <label style="display:block;font-size:11px;font-weight:700;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">Chat ID ของคุณ</label>
        <input class="form-input" id="chatid-in" type="number" placeholder="เช่น 7234688831" style="margin-bottom:12px"/>
        <button class="btn btn-green btn-full" id="do-login">✅ เข้าสู่ระบบ</button>
        <div style="font-size:11px;color:#aaa;text-align:center;margin-top:10px">หรือเปิดผ่านปุ่ม /admin ใน Telegram Bot</div>
      </div>
    </div>`;

  // ══════════════════════════════════════════
  //  📦  PRODUCTS TAB
  // ══════════════════════════════════════════
  function prodsTab() {
    const low = S.products.filter(p=>(p.stock||0)<=10&&p.active);
    const html = S.products.map(p => {
      const b = S.brands.find(x=>x.key===p.brand);
      return `
        <div class="prod-item" style="border-left-color:${p.active?(b?.color||"#ccc"):"#e0e0e0"};opacity:${p.active?1:0.6}">
          <div class="prod-thumb" style="background:${b?.color}18">
            ${p.imageUrl?`<img src="${p.imageUrl}" onerror="this.style.display='none'"/>`:(b?.emoji||"📦")}
          </div>
          <div class="prod-info">
            <div class="prod-name">${p.name}</div>
            <div class="prod-meta">
              ${b?`<span class="badge" style="background:${b.color}15;color:${b.color}">${b.emoji} ${b.name}</span>`:""}
              ${p.active?`<span class="badge badge-green">แสดง</span>`:`<span class="badge badge-gray">ซ่อน</span>`}
              ${(p.stock||0)<=5?`<span class="badge badge-red">⚠️${p.stock||0}</span>`:(p.stock||0)<=10?`<span class="badge badge-orange">📦${p.stock||0}</span>`:`<span style="font-size:11px;color:#aaa">📦${p.stock||0}</span>`}
            </div>
            <div class="prod-price" style="color:${b?.color||"#333"}">${fmt(p.price)}</div>
          </div>
          <div class="prod-actions">
            <button class="btn btn-blue btn-icon" data-ep="${p.docId}" title="แก้ไข">✏️</button>
            <button class="btn btn-orange btn-icon" data-sp="${p.docId}" title="สต็อก">📦</button>
            <button class="btn ${p.active?"btn-gray":"btn-green"} btn-icon" data-tp="${p.docId}" data-ta="${p.active}" title="${p.active?"ซ่อน":"แสดง"}">${p.active?"👁️":"👁"}</button>
            <button class="btn btn-red btn-icon" data-dp="${p.docId}" data-dn="${p.name}" title="ลบ">🗑️</button>
          </div>
        </div>`;
    }).join("") || `<div class="empty"><div class="empty-icon">📦</div><div>ยังไม่มีสินค้าค่ะ</div></div>`;
    return `
      ${low.length>0?`<div class="alert-bar">⚠️ สินค้าสต็อกต่ำ ${low.length} รายการ (≤10 ชิ้น)</div>`:""}
      <div class="card-header">
        <div class="card-title">สินค้าทั้งหมด (${S.products.length})</div>
        <button class="btn btn-green" id="add-prod">➕ เพิ่มสินค้า</button>
      </div>
      ${html}`;
  }

  // ══════════════════════════════════════════
  //  🏷️  BRANDS TAB
  // ══════════════════════════════════════════
  function brandsTab() {
    const html = S.brands.map(b => {
      const cnt = S.products.filter(p=>p.brand===b.key).length;
      return `
        <div class="brand-card-admin">
          <div class="brand-card-header" style="background:linear-gradient(135deg,${b.color}20,${b.color}08)">
            <div class="brand-card-info">
              <div class="brand-emoji-box" style="background:${b.color}25">${b.emoji}</div>
              <div>
                <div style="font-weight:700;font-size:15px;color:${b.color}">${b.name}</div>
                <div style="font-size:12px;color:#888">${cnt} SKU • ${b.desc||""}</div>
              </div>
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-blue btn-sm" data-eb="${b.docId}">✏️ แก้ไข</button>
              <button class="btn btn-red btn-sm" data-db="${b.docId}" data-dbn="${b.name}">🗑️</button>
            </div>
          </div>
          <div style="padding:10px 16px;display:flex;flex-wrap:wrap;gap:6px">
            ${S.products.filter(p=>p.brand===b.key).slice(0,4).map(p=>`<span class="badge" style="background:${b.color}12;color:${b.color}">${p.name}</span>`).join("")}

  // ══════════════════════════════════════════
  //  📊  STATS TAB
  // ══════════════════════════════════════════
  function statsTab() {
    const totalSKU  = S.products.length;
    const activeSKU = S.products.filter(p=>p.active).length;
    const lowStock  = S.products.filter(p=>(p.stock||0)<=10).length;
    const totalVal  = S.products.reduce((s,p)=>s+(p.price*(p.stock||0)),0);
    const confirmed = S.orders.filter(o=>o.status==="ยืนยันแล้ว").length;
    const revenue   = S.orders.filter(o=>o.status==="ยืนยันแล้ว").reduce((s,o)=>s+(o.total||0),0);
    return `
      <div class="stat-grid">
        ${[
          ["📦",totalSKU,"SKU ทั้งหมด","#1565c0"],
          ["✅",activeSKU,"SKU แสดง","#00B900"],
          ["⚠️",lowStock+" รายการ","สต็อกต่ำ","#f57c00"],
          ["💰",fmt(totalVal),"มูลค่าสต็อก","#7B1FA2"],
          ["📋",S.orders.length,"ออเดอร์ทั้งหมด","#1565c0"],
          ["🎉",confirmed,"ยืนยันแล้ว","#00B900"],
          ["💵",fmt(revenue),"ยอดขาย COD","#f57c00"],
          ["🏷️",S.brands.length,"แบรนด์","#7B1FA2"],
        ].map(([e,v,l,c])=>`
          <div class="stat-card">
            <div style="font-size:20px">${e}</div>
            <div class="stat-val" style="color:${c}">${v}</div>
            <div class="stat-label">${l}</div>
          </div>`).join("")}
      </div>
      <div style="background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,0.06)">
        <div style="font-weight:800;font-size:14px;margin-bottom:12px">สรุปรายแบรนด์</div>
        ${S.brands.map(b=>{
          const bp=S.products.filter(p=>p.brand===b.key);
          const stk=bp.reduce((s,p)=>s+(p.stock||0),0);
          const val=bp.reduce((s,p)=>s+(p.price*(p.stock||0)),0);
          return `
            <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f5f5f5">
              <span style="font-size:22px">${b.emoji}</span>
              <div style="flex:1">
                <div style="font-weight:700;color:${b.color}">${b.name}</div>
                <div style="font-size:11px;color:#aaa">${bp.length} SKU • ${stk} ชิ้น</div>
              </div>
              <div style="font-weight:800;font-size:14px">${fmt(val)}</div>
            </div>`;
        }).join("")}
      </div>`;
  }

  function bindBrowserLogin() {
    document.getElementById("do-login")?.addEventListener("click", async () => {
      const chatId = document.getElementById("chatid-in")?.value.trim();
      if (!chatId) return toast("กรุณากรอก Chat ID ค่ะ","error");
      setState({ view:"loading" });
      const snap = await getDoc(doc(db,"admins",chatId));
      if (snap.exists()&&snap.data().active) {
        ADMIN = snap.data();
        await loadAll();
        setState({ view:"main" });
        toast("✅ เข้าสู่ระบบสำเร็จค่ะ");
      } else if (chatId===ADMIN_CHAT_ID) {
        ADMIN = { chatId, name:"แอดมิน", role:"superadmin" };
        await loadAll();
        setState({ view:"main" });
        toast("✅ เข้าสู่ระบบสำเร็จค่ะ");
      } else {
        setState({ view:"browser" });
        toast("ไม่พบ Chat ID นี้ในระบบค่ะ","error");
      }
    });
  }

  function bindMain() {
    document.querySelectorAll(".tab").forEach(el =>
      el.addEventListener("click", async () => {
        if (el.dataset.tab==="orders") S.orders = await loadOrders();
        setState({ tab:el.dataset.tab });
      }));

    document.getElementById("add-prod")?.addEventListener("click", () =>
      setState({ modal:"add_prod", modalData:{ active:true, brand:S.brands[0]?.key } }));
    document.getElementById("add-brand")?.addEventListener("click", () =>
      setState({ modal:"add_brand", modalData:{ emoji:"🌸", color:"#4ade80" } }));
    document.getElementById("refresh-orders")?.addEventListener("click", async () => {
      S.orders = await loadOrders(); setState({});
    });

    // Edit product
    document.querySelectorAll("[data-ep]").forEach(el =>
      el.addEventListener("click", () => {
        const p = S.products.find(x=>x.docId===el.dataset.ep);
        setState({ modal:"edit_prod", modalData:{...p} });
      }));

    // Stock
    document.querySelectorAll("[data-sp]").forEach(el =>
      el.addEventListener("click", () =>
        setState({ modal:"stock", modalData:{ docId:el.dataset.sp } })));

    // Toggle active
    document.querySelectorAll("[data-tp]").forEach(el =>
      el.addEventListener("click", async () => {
        const p = S.products.find(x=>x.docId===el.dataset.tp);
        await saveProd({ active:!p.active }, p.docId);
        S.products = await loadProducts(); setState({});
        toast(p.active?"ซ่อนสินค้าแล้ว":"แสดงสินค้าแล้ว", p.active?"warn":"success");
      }));

    // Delete product
    document.querySelectorAll("[data-dp]").forEach(el =>
      el.addEventListener("click", () =>
        setState({ confirm:{ icon:"🗑️", title:"ลบสินค้า?",
          desc:`ต้องการลบ "${el.dataset.dn}" ?\nไม่สามารถกู้คืนได้`, ok:"🗑️ ลบ",
          onOk: async () => { await delProd(el.dataset.dp); S.products=await loadProducts(); setState({ confirm:null }); toast("🗑️ ลบสินค้าแล้ว","error"); }
        }})));

    // Edit brand
    document.querySelectorAll("[data-eb]").forEach(el =>
      el.addEventListener("click", () => {
        const b = S.brands.find(x=>x.docId===el.dataset.eb);
        setState({ modal:"edit_brand", modalData:{...b} });
      }));

    // Delete brand
    document.querySelectorAll("[data-db]").forEach(el =>
      el.addEventListener("click", () =>
        setState({ confirm:{ icon:"🗑️", title:"ลบแบรนด์?",
          desc:`ต้องการลบ "${el.dataset.dbn}" ?\nสินค้าในแบรนด์จะยังอยู่`, ok:"🗑️ ลบ",
          onOk: async () => { await delBrand(el.dataset.db); S.brands=await loadBrands(); setState({ confirm:null }); toast("🗑️ ลบแบรนด์แล้ว","error"); }
        }})));

    // Confirm/Reject order
    document.querySelectorAll("[data-co]").forEach(el =>
      el.addEventListener("click", async () => {
        await updateOrder(el.dataset.co, "ยืนยันแล้ว", el.dataset.cid);
        S.orders=await loadOrders(); setState({});
        toast("✅ ยืนยันออเดอร์แล้ว");
      }));
    document.querySelectorAll("[data-ro]").forEach(el =>
      el.addEventListener("click", async () => {
        await updateOrder(el.dataset.ro, "ปฏิเสธ", el.dataset.rid);
        S.orders=await loadOrders(); setState({});
        toast("❌ ปฏิเสธออเดอร์แล้ว","error");
      }));
  }

  function bindModal() {
    document.getElementById("close-modal")?.addEventListener("click", () => setState({ modal:null, modalData:{} }));
    document.getElementById("modal-ov")?.addEventListener("click", e => {
      if (e.target.id==="modal-ov") setState({ modal:null, modalData:{} });
    });

    // Save product
    document.getElementById("save-prod")?.addEventListener("click", async () => {
      const data = {
        brand      : document.getElementById("f-brand")?.value,
        name       : document.getElementById("f-name")?.value.trim(),
        price      : Number(document.getElementById("f-price")?.value),
        stock      : Number(document.getElementById("f-stock")?.value||0),
        imageUrl   : document.getElementById("f-img")?.value.trim(),
        description: document.getElementById("f-desc")?.value.trim(),
        active     : S.modalData.active !== false,
      };
      if (!data.name||!data.price) return toast("กรุณากรอกชื่อและราคาค่ะ","error");
      if (!data.id && S.modal==="add_prod") {
        const prefix = (data.brand||"XX").slice(0,2).toUpperCase();
        data.id = prefix + Date.now().toString().slice(-4);
      }
      await saveProd(data, S.modal==="edit_prod"?S.modalData.docId:null);
      S.products=await loadProducts();
      setState({ modal:null, modalData:{} });
      toast("✅ บันทึกสินค้าแล้ว");
    });

    // Toggle in modal
    document.getElementById("f-toggle")?.addEventListener("click", () => {
      const btn  = document.getElementById("f-toggle");
      const knob = btn?.querySelector(".toggle-knob");
      const nv   = S.modalData.active === false;
      btn.style.background = nv ? "var(--green)" : "#ccc";
      knob.style.left      = nv ? "22px" : "3px";
      S.modalData.active   = nv;
    });

    // Save brand
    document.getElementById("save-brand")?.addEventListener("click", async () => {
      const name  = document.getElementById("f-bname")?.value.trim();
      const desc  = document.getElementById("f-bdesc")?.value.trim();
      const emoji = document.getElementById("f-bemoji")?.value;
      const color = document.getElementById("f-bcolor")?.value;
      if (!name) return toast("กรุณากรอกชื่อแบรนด์ค่ะ","error");
      const key  = S.modal==="edit_brand"
        ? S.modalData.key
        : name.toLowerCase().replace(/[^a-z0-9]/g,"").slice(0,12)||"brand"+Date.now();
      await saveBrand({ key,name,desc,emoji,color }, S.modal==="edit_brand"?S.modalData.docId:null);
      S.brands=await loadBrands();
      setState({ modal:null, modalData:{} });
      toast("✅ บันทึกแบรนด์แล้ว");
    });

    // Emoji picker
    document.querySelectorAll(".em-pick").forEach(el =>
      el.addEventListener("click", () => {
        document.getElementById("f-bemoji").value = el.dataset.e;
        document.getElementById("bprev-e").textContent = el.dataset.e;
        document.querySelectorAll(".em-pick").forEach(b=>b.className="btn btn-gray em-pick");
        el.className = "btn btn-green em-pick";
      }));

    // Color picker
    document.querySelectorAll(".cl-pick").forEach(el =>
      el.addEventListener("click", () => {
        const c = el.dataset.c;
        document.getElementById("f-bcolor").value = c;
        document.getElementById("bprev-n").style.color = c;
        document.getElementById("bprev").style.borderColor = c;
        document.querySelectorAll(".cl-pick").forEach(b=>b.style.border="3px solid transparent");
        el.style.border = "3px solid #333";
      }));

    document.getElementById("f-bname")?.addEventListener("input", e => {
      const el = document.getElementById("bprev-n");
      if (el) el.textContent = e.target.value||"ชื่อแบรนด์";
    });
    document.getElementById("f-bcolor")?.addEventListener("input", e => {
      document.getElementById("bprev-n").style.color = e.target.value;
      document.getElementById("bprev").style.borderColor = e.target.value;
    });

    // Stock delta
    document.querySelectorAll(".sk-delta").forEach(el =>
      el.addEventListener("click", () => {
        const p   = S.products.find(x=>x.docId===S.modalData.docId);
        const cur = Number(document.getElementById("f-stock-val")?.value)||p?.stock||0;
        document.getElementById("f-stock-val").value = Math.max(0, cur+Number(el.dataset.n));
      }));

    // Save stock
    document.getElementById("save-stock")?.addEventListener("click", async () => {
      const p  = S.products.find(x=>x.docId===S.modalData.docId);
      const nv = Number(document.getElementById("f-stock-val")?.value);
      if (isNaN(nv)||nv<0) return toast("จำนวนไม่ถูกต้องค่ะ","error");
      await saveProd({ stock:nv }, p.docId);
      S.products=await loadProducts();
      setState({ modal:null, modalData:{} });
      toast("📦 อัปเดตสต็อกแล้ว");
    });
  }

  function bindConfirm() {
    document.getElementById("c-cancel")?.addEventListener("click", () => setState({ confirm:null }));
    document.getElementById("c-ok")?.addEventListener("click", () => S.confirm?.onOk?.());
  }

  // ══════════════════════════════════════════
  //  🚀  INIT
  // ══════════════════════════════════════════
  async function init() {
    setState({ view:"loading" });
    try {
      const auth = await checkAuth();
      if (auth===true) {
        await loadAll();
        setState({ view:"main" });
      } else if (auth==="browser") {
        setState({ view:"browser" });
      } else {
        setState({ view:"denied" });
      }
    } catch(err) {
      console.error("Init:", err);
      setState({ view:"browser" });
    }
  }

  init();
</script>
</body>
</html>
